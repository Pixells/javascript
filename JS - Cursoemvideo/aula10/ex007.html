<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somando Números</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1.2em;
        }
        input{
            font-size: 1.2em;
            width: 100px;
        }
        div#res{
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Somando Valores</h1>
    <input type="number" name="n1" id="in1"> +
    <input type="number" name="n2" id="in2">
    <input type="button" value="Somar" onclick="somar()">
    <div id="res">Resultado</div>

    <script>
        function somar() {
            var tn1 = window.document.getElementById('in1')
            var tn2 = window.document.querySelector('input#in2')
            var res = window.document.getElementById('res')
            var valor1 = Number(tn1.value)
            var valor2 = Number(tn2.value)
            var s = valor1 + valor2

            res.innerHTML = `A soma entre ${valor1} e ${valor2} é iqual a <strong>${s}</strong>`
        }
    </script>
</body>
</html>
