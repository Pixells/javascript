<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
    <style>
        body{
            font-size: 2em;
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <script>
        var nome = window.prompt('Qual é seu nome?')
        document.write(`Seu nome tem <strong>${nome.length}</strong> letras. <br>`)
        document.write(`Seu nome em maiúsculo é <strong>${nome.toUpperCase()}</strong> <br>`) 
        document.write(`Seu nome em minúsculas é <strong>${nome.toLowerCase()}</strong> <br>`) 
    </script>
</body>
</html>
