<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Contador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Vamos Contar</h1>
    </header>
    <section>
        <div id="dados">
            <p>
                <label for="iinicio">Início: </label>
                <input type="text" name="inicio" id="iinicio">
            </p>

            <p>
                <label for="ifim">Fim: </label>
                <input type="text" name="fim" id="ifim">
            </p>

            <p>
                <label for="ipasso">Passo: </label>
                <input type="text" name="passo" id="ipasso">
            </p>

            <input type="button" value="Contar" onclick="contar()">

        </div>
        <div id="res">
            <!-- Contagem -->
        </div>
    </section>
    <footer>
        <p>&copy; Criado por <strong>aluno</strong> do CursoemVideo</p>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
